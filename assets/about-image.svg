<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#f0f0f0"/>
  <rect x="50" y="50" width="700" height="500" fill="#000" rx="10"/>
  <rect x="100" y="100" width="600" height="400" fill="#fff" rx="5"/>
  
  <!-- Restaurant elements -->
  <rect x="150" y="150" width="100" height="150" fill="#333" rx="5"/>
  <rect x="300" y="200" width="100" height="100" fill="#555" rx="5"/>
  <rect x="450" y="150" width="100" height="150" fill="#333" rx="5"/>
  
  <!-- Tables -->
  <circle cx="200" cy="450" r="30" fill="#666"/>
  <circle cx="400" cy="450" r="30" fill="#666"/>
  <circle cx="600" cy="450" r="30" fill="#666"/>
  
  <!-- Kitchen counter -->
  <rect x="100" y="350" width="600" height="20" fill="#000"/>
  
  <!-- Text -->
  <text x="400" y="300" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#fff">FOOD PANDA</text>
  <text x="400" y="330" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#fff">RESTAURANTE</text>
</svg>
